<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMPOOS Login</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="dashboard-page login-page">
    <div class="login-shell">
        <section class="login-panel">
            <div class="dashboard-brand login-brand">
                <div class="dashboard-brand-mark">SM</div>
                <div>
                    <div class="dashboard-brand-title">SMPOOS</div>
                    <div class="dashboard-brand-subtitle">Smart Maritime Port Operations</div>
                </div>
            </div>

            <div class="login-copy">
                <h1>Admin Login</h1>
                <p>Sign in to access the port operations dashboard and management tools.</p>
            </div>

            <div id="loginMessage" class="login-message">
                Enter your admin account details to continue.
            </div>

            <form id="loginForm" class="login-form">
                <div class="login-field">
                    <label class="login-label" for="loginEmail">Email</label>
                    <input
                        class="dashboard-filter-input"
                        id="loginEmail"
                        type="email"
                        placeholder="user@authority.com"
                        required
                    >
                </div>
                <div class="login-field">
                    <label class="login-label" for="loginPassword">Password</label>
                    <input
                        class="dashboard-filter-input"
                        id="loginPassword"
                        type="password"
                        placeholder="admin123"
                        required
                    >
                </div>
                <button class="dashboard-filter-button login-submit" type="submit">Sign In</button>
            </form>

            <div class="login-demo-card">
                <div class="login-demo-title">Dummy Login Credentials</div>
                <div class="login-demo-copy">Click any demo account to autofill the login form.</div>
                <div class="login-demo-actions">
                    <button
                        class="dashboard-toggle demo-login-button"
                        type="button"
                        data-email="user6@portauthority.com"
                        data-password="admin123"
                    >
                        Admin Demo: user6@portauthority.com / admin123
                    </button>
                    <button
                        class="dashboard-toggle demo-login-button"
                        type="button"
                        data-email="user19@portauthority.com"
                        data-password="harbour123"
                    >
                        Harbourmaster Demo: user19@portauthority.com / harbour123
                    </button>
                    <button
                        class="dashboard-toggle demo-login-button"
                        type="button"
                        data-email="user12@portauthority.com"
                        data-password="safety123"
                    >
                        Safety/Security Demo: user12@portauthority.com / safety123
                    </button>
                </div>
            </div>
        </section>
    </div>

    <script src="/static/login.js"></script>
</body>
</html>
