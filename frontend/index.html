<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Port Data Dashboard</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-light">
    <div class="container py-4">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h1 class="h3 mb-1">Port Data Dashboard</h1>
                <p class="text-muted mb-0">Frontend layer connected to the Python backend</p>
            </div>
            <button id="refreshButton" class="btn btn-primary">Refresh Data</button>
        </div>

        <div id="statusMessage" class="alert alert-info">Loading dashboard data...</div>

        <div id="summaryCards" class="row g-3 mb-4"></div>

        <div class="row g-4">
            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h2 class="h5 card-title">Locations</h2>
                        <div class="table-responsive">
                            <table class="table table-striped table-hover" id="locationsTable"></table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h2 class="h5 card-title">Routes</h2>
                        <div class="table-responsive">
                            <table class="table table-striped table-hover" id="routesTable"></table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h2 class="h5 card-title">Notifications</h2>
                        <div class="table-responsive">
                            <table class="table table-striped table-hover" id="notificationsTable"></table>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-12">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h2 class="h5 card-title">Users</h2>
                        <div class="table-responsive">
                            <table class="table table-striped table-hover" id="usersTable"></table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
