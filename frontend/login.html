<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMPOOS Login</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-5">
                <div class="card shadow-sm">
                    <div class="card-body p-4">
                        <h1 class="h4 mb-3 text-center">SMPOOS Admin Login</h1>
                        <p class="text-muted text-center mb-4">
                            Sign in to access the port management admin tools.
                        </p>

                        <div id="loginMessage" class="alert alert-secondary">
                            Enter your admin account details to continue.
                        </div>

                        <form id="loginForm" class="row g-3">
                            <div class="col-12">
                                <label class="form-label" for="loginEmail">Email</label>
                                <input
                                    class="form-control"
                                    id="loginEmail"
                                    type="email"
                                    placeholder="user@authority.com"
                                    required
                                >
                            </div>
                            <div class="col-12">
                                <label class="form-label" for="loginPassword">Password</label>
                                <input
                                    class="form-control"
                                    id="loginPassword"
                                    type="password"
                                    placeholder="admin123"
                                    required
                                >
                            </div>
                            <div class="col-12">
                                <button class="btn btn-primary w-100" type="submit">Sign In</button>
                            </div>
                        </form>

                        <div class="alert alert-warning mt-4 mb-0">
                            <div class="fw-semibold mb-2">Dummy Login Credentials</div>
                            <div class="small mb-2">Click any demo account to autofill the login form.</div>
                            <div class="d-grid gap-2">
                                <button
                                    class="btn btn-outline-dark demo-login-button"
                                    type="button"
                                    data-email="user6@portauthority.com"
                                    data-password="admin123"
                                >
                                    Admin Demo: user6@portauthority.com / admin123
                                </button>
                                <button
                                    class="btn btn-outline-dark demo-login-button"
                                    type="button"
                                    data-email="user19@portauthority.com"
                                    data-password="harbour123"
                                >
                                    Harbourmaster Demo: user19@portauthority.com / harbour123
                                </button>
                                <button
                                    class="btn btn-outline-dark demo-login-button"
                                    type="button"
                                    data-email="user12@portauthority.com"
                                    data-password="safety123"
                                >
                                    Safety Demo: user12@portauthority.com / safety123
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/login.js"></script>
</body>
</html>
